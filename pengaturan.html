<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rawframe - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Background Orbs -->
    <div class="bg-orb" style="width:400px;height:400px;background:rgba(255,107,43,0.03);top:-100px;right:-100px;">
    </div>
    <div class="bg-orb" style="width:300px;height:300px;background:rgba(255,107,43,0.02);bottom:10%;left:30%;"></div>

    <!-- Mobile Overlay -->
    <div class="mobile-overlay" id="mobileOverlay" onclick="toggleSidebar()"></div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal-box" id="modalBox">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-lg font-bold" id="modalTitle">Tambah Perangkat</h3>
                <button onclick="closeModal()" class="text-gray-500 hover:text-white transition-colors"
                    aria-label="Tutup modal">
                    <i class="fas fa-times text-lg"></i>
                </button>
            </div>
            <div id="modalContent"></div>
        </div>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar" role="navigation" aria-label="Menu navigasi utama">
        <!-- Brand -->
        <div class="px-6 py-6 border-b" style="border-color: var(--border);">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-xl flex items-center justify-center pulse-accent"
                    style="background: var(--accent);">
                    <i class="fas fa-camera text-white text-sm"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold brand-shimmer" style="font-family: 'Space Grotesk', sans-serif;">
                        Rawframe</h1>
                    <p class="text-[10px] font-medium tracking-widest uppercase" style="color: var(--text-muted);">
                        Photobooth Studio</p>
                </div>
            </div>
        </div>

        <!-- Navigation -->
        <nav class="flex-1 py-4 overflow-y-auto">
            <p class="px-8 mb-2 text-[10px] font-semibold tracking-widest uppercase" style="color: var(--text-muted);">
                Menu Utama</p>
            <a href="index.html" class="nav-item">
                <i class="fas fa-border-all"></i>
                <span>Dashboard</span>
            </a>
            <a href="perangkat.html" class="nav-item">
                <i class="fas fa-desktop"></i>
                <span>Perangkat</span>
                <span class="ml-auto badge badge-success text-[10px]">12</span>
            </a>
            <a href="langganan.html" class="nav-item">
                <i class="fas fa-crown"></i>
                <span>Langganan</span>
            </a>
            <a href="transaksi.html" class="nav-item">
                <i class="fas fa-receipt"></i>
                <span>Transaksi</span>
                <span class="ml-auto w-2 h-2 rounded-full" style="background: var(--accent);"></span>
            </a>

            <p class="px-8 mb-2 mt-6 text-[10px] font-semibold tracking-widest uppercase"
                style="color: var(--text-muted);">Manajemen</p>
            <a href="voucher.html" class="nav-item">
                <i class="fas fa-ticket"></i>
                <span>Voucher</span>
            </a>
            <a href="frame.html" class="nav-item">
                <i class="fas fa-crop-simple"></i>
                <span>Frame</span>
            </a>
            <a href="pengaturan.html" class="nav-item active">
                <i class="fas fa-gear"></i>
                <span>Pengaturan</span>
            </a>
        </nav>

        <!-- Sidebar Footer -->
        <div class="p-4 border-t" style="border-color: var(--border);">
            <div class="flex items-center gap-3 p-3 rounded-xl" style="background: var(--accent-soft);">
                <div class="w-9 h-9 rounded-lg overflow-hidden flex-shrink-0">
                    <img src="https://picsum.photos/seed/rawframe-admin/80/80.jpg" alt="Admin avatar"
                        class="w-full h-full object-cover">
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-semibold truncate">Admin Studio</p>
                    <p class="text-[11px]" style="color: var(--text-muted);">Owner</p>
                </div>
                <button class="text-gray-500 hover:text-white transition-colors" aria-label="Logout">
                    <i class="fas fa-right-from-bracket text-sm"></i>
                </button>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <!-- Top Bar -->
        <header class="sticky top-0 z-30 border-b px-6 py-4 flex items-center gap-4"
            style="background: rgba(13,13,13,0.85); backdrop-filter: blur(16px); border-color: var(--border);">
            <!-- Hamburger -->
            <button onclick="toggleSidebar()"
                class="lg:hidden w-9 h-9 rounded-lg flex items-center justify-center hover:bg-white/5 transition-colors"
                aria-label="Toggle sidebar">
                <i class="fas fa-bars text-sm" style="color: var(--text-secondary);"></i>
            </button>

            <!-- Search -->
            <div class="search-box flex-1 max-w-md hidden sm:block">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Cari transaksi, perangkat, voucher..." class="input-field"
                    style="background: var(--bg-card);">
            </div>

            <div class="flex items-center gap-3 ml-auto">
                <!-- Date -->
                <div class="hidden md:flex items-center gap-2 px-3 py-2 rounded-lg text-xs"
                    style="background: var(--bg-card); color: var(--text-secondary); border: 1px solid var(--border);">
                    <i class="fas fa-calendar-day" style="color: var(--accent);"></i>
                    <span id="currentDate"></span>
                </div>

                <!-- Notification -->
                <button
                    class="relative w-9 h-9 rounded-lg flex items-center justify-center hover:bg-white/5 transition-colors"
                    aria-label="Notifikasi" onclick="showToast('3 notifikasi baru menunggu', 'info')">
                    <i class="fas fa-bell text-sm" style="color: var(--text-secondary);"></i>
                    <span class="notif-badge">3</span>
                </button>

                <!-- Add Device -->
                <button class="btn-primary hidden sm:flex items-center gap-2" onclick="openAddDeviceModal()">
                    <i class="fas fa-plus text-xs"></i>
                    <span>Tambah Perangkat</span>
                </button>
                <button class="btn-primary sm:hidden w-9 h-9 !p-0 flex items-center justify-center"
                    onclick="openAddDeviceModal()" aria-label="Tambah perangkat">
                    <i class="fas fa-plus text-sm"></i>
                </button>
            </div>
        </header>

        <!-- Page Content -->
        <div class="p-6 relative z-10" id="pageContent">
            <div class="mb-8">
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-10 h-10 rounded-xl flex items-center justify-center" style="background: var(--accent-glow);">
                        <i class="fas fa-gear" style="color: var(--accent);"></i>
                    </div>
                    <div>
                        <h2 class="text-2xl font-bold" style="font-family: 'Space Grotesk', sans-serif;">Pengaturan Sistem</h2>
                        <p style="color: var(--text-secondary); font-size: 14px;">Konfigurasi sistem, notifikasi, dan preferensi akun</p>
                    </div>
                </div>
            </div>

            <div class="max-w-2xl space-y-6">
                <div class="chart-card">
                    <h3 class="text-base font-bold mb-5">Informasi Studio</h3>
                    <div class="space-y-4">
                        <div><label class="block text-xs font-medium mb-1.5" style="color: var(--text-secondary);">Nama Studio</label><input type="text" value="Rawframe Studio" class="input-field"></div>
                        <div><label class="block text-xs font-medium mb-1.5" style="color: var(--text-secondary);">Email</label><input type="email" value="admin@rawframe.id" class="input-field"></div>
                        <div><label class="block text-xs font-medium mb-1.5" style="color: var(--text-secondary);">Nomor Telepon</label><input type="tel" value="+62 812 3456 7890" class="input-field"></div>
                        <div><label class="block text-xs font-medium mb-1.5" style="color: var(--text-secondary);">Alamat</label><textarea class="input-field" rows="2">Jl. Sudirman No. 45, Jakarta Pusat</textarea></div>
                    </div>
                </div>
                <div class="chart-card">
                    <h3 class="text-base font-bold mb-5">Notifikasi</h3>
                    <div class="space-y-4">
                        
                        <label class="flex items-center justify-between cursor-pointer group">
                            <span class="text-sm" style="color: var(--text-secondary);">Notifikasi perangkat offline</span>
                            <div class="relative">
                                <input type="checkbox" class="sr-only peer" checked onchange="showToast('Pengaturan notifikasi diperbarui', 'success')">
                                <div class="w-10 h-5 rounded-full transition-colors peer-checked:bg-orange-500" style="background: var(--border);"></div>
                                <div class="absolute top-0.5 left-0.5 w-4 h-4 bg-white rounded-full transition-transform peer-checked:translate-x-5"></div>
                            </div>
                        </label>
                    
                        <label class="flex items-center justify-between cursor-pointer group">
                            <span class="text-sm" style="color: var(--text-secondary);">Notifikasi transaksi gagal</span>
                            <div class="relative">
                                <input type="checkbox" class="sr-only peer" checked onchange="showToast('Pengaturan notifikasi diperbarui', 'success')">
                                <div class="w-10 h-5 rounded-full transition-colors peer-checked:bg-orange-500" style="background: var(--border);"></div>
                                <div class="absolute top-0.5 left-0.5 w-4 h-4 bg-white rounded-full transition-transform peer-checked:translate-x-5"></div>
                            </div>
                        </label>
                    
                        <label class="flex items-center justify-between cursor-pointer group">
                            <span class="text-sm" style="color: var(--text-secondary);">Laporan harian via email</span>
                            <div class="relative">
                                <input type="checkbox" class="sr-only peer"  onchange="showToast('Pengaturan notifikasi diperbarui', 'success')">
                                <div class="w-10 h-5 rounded-full transition-colors peer-checked:bg-orange-500" style="background: var(--border);"></div>
                                <div class="absolute top-0.5 left-0.5 w-4 h-4 bg-white rounded-full transition-transform peer-checked:translate-x-5"></div>
                            </div>
                        </label>
                    
                        <label class="flex items-center justify-between cursor-pointer group">
                            <span class="text-sm" style="color: var(--text-secondary);">Peringatan langganan expiry</span>
                            <div class="relative">
                                <input type="checkbox" class="sr-only peer" checked onchange="showToast('Pengaturan notifikasi diperbarui', 'success')">
                                <div class="w-10 h-5 rounded-full transition-colors peer-checked:bg-orange-500" style="background: var(--border);"></div>
                                <div class="absolute top-0.5 left-0.5 w-4 h-4 bg-white rounded-full transition-transform peer-checked:translate-x-5"></div>
                            </div>
                        </label>
                    
                        <label class="flex items-center justify-between cursor-pointer group">
                            <span class="text-sm" style="color: var(--text-secondary);">Update sistem baru</span>
                            <div class="relative">
                                <input type="checkbox" class="sr-only peer"  onchange="showToast('Pengaturan notifikasi diperbarui', 'success')">
                                <div class="w-10 h-5 rounded-full transition-colors peer-checked:bg-orange-500" style="background: var(--border);"></div>
                                <div class="absolute top-0.5 left-0.5 w-4 h-4 bg-white rounded-full transition-transform peer-checked:translate-x-5"></div>
                            </div>
                        </label>
                    
                    </div>
                </div>
                <div class="chart-card">
                    <h3 class="text-base font-bold mb-5">Keamanan</h3>
                    <div class="space-y-4">
                        <div><label class="block text-xs font-medium mb-1.5" style="color: var(--text-secondary);">Password Lama</label><input type="password" placeholder="Masukkan password lama" class="input-field"></div>
                        <div><label class="block text-xs font-medium mb-1.5" style="color: var(--text-secondary);">Password Baru</label><input type="password" placeholder="Masukkan password baru" class="input-field"></div>
                        <div><label class="block text-xs font-medium mb-1.5" style="color: var(--text-secondary);">Konfirmasi Password</label><input type="password" placeholder="Ulangi password baru" class="input-field"></div>
                        <button class="btn-primary" onclick="showToast('Password berhasil diubah', 'success')">Ubah Password</button>
                    </div>
                </div>
                <button class="btn-primary" onclick="showToast('Semua pengaturan berhasil disimpan', 'success')">
                    <i class="fas fa-check mr-2 text-xs"></i>Simpan Semua Perubahan
                </button>
            </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
